services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - BEDROCK_ENCRYPT_KEY=${BEDROCK_ENCRYPT_KEY:?BEDROCK_ENCRYPT_KEY is required}
      - BEDROCK_HTTP_HOST=0.0.0.0
      - BEDROCK_HTTP_PORT=8080
      - BEDROCK_CORS_ORIGINS=http://localhost,http://localhost:4174,http://127.0.0.1:4174
      - BEDROCK_JWT_SECRET=${BEDROCK_JWT_SECRET:?BEDROCK_JWT_SECRET is required}
      - BEDROCK_DEV_AUTH_ENABLED=${BEDROCK_DEV_AUTH_ENABLED:-false}
      - BEDROCK_DEV_AUTH_SECRET=${BEDROCK_DEV_AUTH_SECRET:-}
      - BEDROCK_KEYCLOAK_ENABLED=${BEDROCK_KEYCLOAK_ENABLED:-false}
      - BEDROCK_KEYCLOAK_ISSUER=${BEDROCK_KEYCLOAK_ISSUER:-}
      - BEDROCK_KEYCLOAK_JWKS_URI=${BEDROCK_KEYCLOAK_JWKS_URI:-}
      - BEDROCK_KEYCLOAK_CLIENT_ID=${BEDROCK_KEYCLOAK_CLIENT_ID:-bedrock-ui}
      - BEDROCK_KEYCLOAK_AUDIENCE=${BEDROCK_KEYCLOAK_AUDIENCE:-bedrock-ui}
      - BEDROCK_API_BEARER_TOKEN=${BEDROCK_API_BEARER_TOKEN:?BEDROCK_API_BEARER_TOKEN is required}
      - BEDROCK_MONGO_URI=${BEDROCK_MONGO_URI:-mongodb://mongo:27017}
      - BEDROCK_MONGO_DATABASE=${BEDROCK_MONGO_DATABASE:-schema_migrator}
      - BEDROCK_MONGO_TARGETS_COLLECTION=${BEDROCK_MONGO_TARGETS_COLLECTION:-targets}
      - BEDROCK_SQL_FILES_COLLECTION=${BEDROCK_SQL_FILES_COLLECTION:-sql_files}
      - BEDROCK_PATCHES_COLLECTION=${BEDROCK_PATCHES_COLLECTION:-patches}
      - BEDROCK_RUNS_COLLECTION=${BEDROCK_RUNS_COLLECTION:-runs}
      - BEDROCK_VALIDATIONS_COLLECTION=${BEDROCK_VALIDATIONS_COLLECTION:-validations}
      - BEDROCK_SNAPSHOTS_COLLECTION=${BEDROCK_SNAPSHOTS_COLLECTION:-snapshots}
      - BEDROCK_AUDIT_COLLECTION=${BEDROCK_AUDIT_COLLECTION:-audit_events}
      - BEDROCK_DB_TEST_ALLOWED_HOSTS=${BEDROCK_DB_TEST_ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.1.221}
      - BEDROCK_DB_URL=${BEDROCK_DB_URL:?BEDROCK_DB_URL is required}
      - BEDROCK_DB_USER=${BEDROCK_DB_USER:?BEDROCK_DB_USER is required}
      - BEDROCK_DB_PASSWORD=${BEDROCK_DB_PASSWORD:?BEDROCK_DB_PASSWORD is required}
      - DATABASE_URL=${BEDROCK_DB_URL:?BEDROCK_DB_URL is required}
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.backend.rule=Host(`${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME is required}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.priority=10
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    command:
      - start
      - --import-realm
      - --hostname=https://${KEYCLOAK_HOSTNAME:?KEYCLOAK_HOSTNAME is required}
      - --hostname-strict=true
      - --http-enabled=true
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      - KC_PROXY_HEADERS=xforwarded
    expose:
      - "8080"
    volumes:
      - ./deploy/keycloak/middleware-realm.json:/opt/keycloak/data/import/middleware-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec \"exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/middleware/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOSTNAME:?KEYCLOAK_HOSTNAME is required}`) && (PathPrefix(`/realms`) || PathPrefix(`/resources`))
      - traefik.http.routers.keycloak.entrypoints=websecure
      - traefik.http.routers.keycloak.priority=20
      - traefik.http.routers.keycloak.tls.certresolver=letsencrypt
      - traefik.http.services.keycloak.loadbalancer.server.port=8080
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-bedrock-ui}
        VITE_KEYCLOAK_REDIRECT_URI: ${VITE_KEYCLOAK_REDIRECT_URI:-}
        VITE_KEYCLOAK_DIRECT_ACCESS_GRANTS: ${VITE_KEYCLOAK_DIRECT_ACCESS_GRANTS:-false}
    restart: unless-stopped
    volumes:
      - ./deploy/instance/runtime-config.js:/usr/share/nginx/html/runtime-config.js:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.frontend.rule=Host(`${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME is required}`) && PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.priority=1
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=8080
    networks:
      - internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=internal
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
      - --entrypoints.web.transport.respondingTimeouts.writeTimeout=0
      - --entrypoints.web.transport.respondingTimeouts.idleTimeout=3600s
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    name: internal
    driver: bridge

volumes:
  mongo-data:
  traefik-letsencrypt:
