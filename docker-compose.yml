services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - BEDROCK_ENCRYPT_KEY=${BEDROCK_ENCRYPT_KEY:?BEDROCK_ENCRYPT_KEY is required}
      - BEDROCK_HTTP_HOST=0.0.0.0
      - BEDROCK_HTTP_PORT=8080
      - BEDROCK_CORS_ORIGINS=http://localhost,http://localhost:4174,http://127.0.0.1:4174
      - BEDROCK_JWT_SECRET=${BEDROCK_JWT_SECRET:?BEDROCK_JWT_SECRET is required}
      - BEDROCK_DEV_AUTH_ENABLED=${BEDROCK_DEV_AUTH_ENABLED:-false}
      - BEDROCK_DEV_AUTH_SECRET=${BEDROCK_DEV_AUTH_SECRET:-}
      - BEDROCK_KEYCLOAK_ENABLED=${BEDROCK_KEYCLOAK_ENABLED:-false}
      - BEDROCK_KEYCLOAK_ISSUER=${BEDROCK_KEYCLOAK_ISSUER:-}
      - BEDROCK_KEYCLOAK_JWKS_URI=${BEDROCK_KEYCLOAK_JWKS_URI:-}
      - BEDROCK_KEYCLOAK_CLIENT_ID=${BEDROCK_KEYCLOAK_CLIENT_ID:-bedrock-ui}
      - BEDROCK_KEYCLOAK_AUDIENCE=${BEDROCK_KEYCLOAK_AUDIENCE:-bedrock-ui}
      - BEDROCK_API_BEARER_TOKEN=${BEDROCK_API_BEARER_TOKEN:?BEDROCK_API_BEARER_TOKEN is required}
      - BEDROCK_MONGO_URI=${BEDROCK_MONGO_URI:-mongodb://mongo:27017}
      - BEDROCK_MONGO_DATABASE=${BEDROCK_MONGO_DATABASE:-schema_migrator}
      - BEDROCK_MONGO_TARGETS_COLLECTION=${BEDROCK_MONGO_TARGETS_COLLECTION:-targets}
      - BEDROCK_SQL_FILES_COLLECTION=${BEDROCK_SQL_FILES_COLLECTION:-sql_files}
      - BEDROCK_PATCHES_COLLECTION=${BEDROCK_PATCHES_COLLECTION:-patches}
      - BEDROCK_RUNS_COLLECTION=${BEDROCK_RUNS_COLLECTION:-runs}
      - BEDROCK_VALIDATIONS_COLLECTION=${BEDROCK_VALIDATIONS_COLLECTION:-validations}
      - BEDROCK_SNAPSHOTS_COLLECTION=${BEDROCK_SNAPSHOTS_COLLECTION:-snapshots}
      - BEDROCK_AUDIT_COLLECTION=${BEDROCK_AUDIT_COLLECTION:-audit_events}
      - BEDROCK_DB_TEST_ALLOWED_HOSTS=${BEDROCK_DB_TEST_ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.1.221}
      - BEDROCK_DB_URL=${BEDROCK_DB_URL:?BEDROCK_DB_URL is required}
      - BEDROCK_DB_USER=${BEDROCK_DB_USER:?BEDROCK_DB_USER is required}
      - BEDROCK_DB_PASSWORD=${BEDROCK_DB_PASSWORD:?BEDROCK_DB_PASSWORD is required}
      - DATABASE_URL=${BEDROCK_DB_URL:?BEDROCK_DB_URL is required}
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.backend.rule=PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.priority=10
      - traefik.http.services.backend.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-bedrock-ui}
        VITE_KEYCLOAK_REDIRECT_URI: ${VITE_KEYCLOAK_REDIRECT_URI:-}
        VITE_KEYCLOAK_DIRECT_ACCESS_GRANTS: ${VITE_KEYCLOAK_DIRECT_ACCESS_GRANTS:-false}
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    networks:
      - internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=internal
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
      - --entrypoints.web.transport.respondingTimeouts.writeTimeout=0
      - --entrypoints.web.transport.respondingTimeouts.idleTimeout=3600s
    ports:
      - "80:80"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    name: internal
    driver: bridge

volumes:
  mongo-data:
