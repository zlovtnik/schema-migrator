services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - BEDROCK_HTTP_HOST=0.0.0.0
      - BEDROCK_HTTP_PORT=8080
      - BEDROCK_CORS_ORIGINS=http://localhost
      - BEDROCK_JWT_SECRET=${BEDROCK_JWT_SECRET}
      - BEDROCK_DEV_AUTH_SECRET=${BEDROCK_DEV_AUTH_SECRET}
      - BEDROCK_DB_URL=${BEDROCK_DB_URL}
      - BEDROCK_DB_USER=${BEDROCK_DB_USER}
      - BEDROCK_DB_PASSWORD=${BEDROCK_DB_PASSWORD}
      - DATABASE_URL=${BEDROCK_DB_URL}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
