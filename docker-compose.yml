services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - BEDROCK_ENCRYPT_KEY=${BEDROCK_ENCRYPT_KEY:?BEDROCK_ENCRYPT_KEY is required}
      - BEDROCK_HTTP_HOST=0.0.0.0
      - BEDROCK_HTTP_PORT=8080
      - BEDROCK_CORS_ORIGINS=${BEDROCK_CORS_ORIGINS:?BEDROCK_CORS_ORIGINS is required}
      - BEDROCK_JWT_SECRET=${BEDROCK_JWT_SECRET:?BEDROCK_JWT_SECRET is required}
      - BEDROCK_DEV_AUTH_ENABLED=${BEDROCK_DEV_AUTH_ENABLED:-false}
      - BEDROCK_DEV_AUTH_SECRET=${BEDROCK_DEV_AUTH_SECRET:-}
      - BEDROCK_KEYCLOAK_ENABLED=${BEDROCK_KEYCLOAK_ENABLED:-true}
      - BEDROCK_KEYCLOAK_ISSUER=${BEDROCK_KEYCLOAK_ISSUER:?BEDROCK_KEYCLOAK_ISSUER is required}
      - BEDROCK_KEYCLOAK_JWKS_URI=${BEDROCK_KEYCLOAK_JWKS_URI:-}
      - BEDROCK_KEYCLOAK_CLIENT_ID=${BEDROCK_KEYCLOAK_CLIENT_ID:-bedrock-ui}
      - BEDROCK_KEYCLOAK_AUDIENCE=${BEDROCK_KEYCLOAK_AUDIENCE:-bedrock-ui}
      - BEDROCK_API_BEARER_TOKEN=${BEDROCK_API_BEARER_TOKEN:?BEDROCK_API_BEARER_TOKEN is required}
      - BEDROCK_STATE_DB_URL=${BEDROCK_STATE_DB_URL:?JDBC MySQL/TiDB URL with sslMode=VERIFY_IDENTITY is required}
      - BEDROCK_STATE_DB_USER=${BEDROCK_STATE_DB_USER:?Dedicated TiDB state user is required}
      - BEDROCK_STATE_DB_PASSWORD=${BEDROCK_STATE_DB_PASSWORD:?BEDROCK_STATE_DB_PASSWORD is required}
      - BEDROCK_STATE_DB_POOL_SIZE=${BEDROCK_STATE_DB_POOL_SIZE:-10}
      - BEDROCK_DB_TEST_ALLOWED_HOSTS=${BEDROCK_DB_TEST_ALLOWED_HOSTS:-}
      - JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/run/tidb-tls/truststore.p12 -Djavax.net.ssl.trustStorePassword=${BEDROCK_STATE_DB_TRUSTSTORE_PASSWORD:?TiDB truststore password is required}
    volumes:
      - ${BEDROCK_STATE_DB_TRUSTSTORE_FILE:?TiDB PKCS12 truststore file is required}:/run/tidb-tls/truststore.p12:ro
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.backend.rule=Host(`${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME is required}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.priority=10
      - traefik.http.routers.backend.tls=true
      - traefik.http.services.backend.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-bedrock-ui}
        VITE_KEYCLOAK_REDIRECT_URI: ${VITE_KEYCLOAK_REDIRECT_URI:-}
    restart: unless-stopped
    volumes:
      - ./deploy/instance/runtime-config.js:/usr/share/nginx/html/runtime-config.js:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=internal
      - traefik.http.routers.frontend.rule=Host(`${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME is required}`) && PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.priority=1
      - traefik.http.routers.frontend.tls=true
      - traefik.http.services.frontend.loadbalancer.server.port=8080
    networks:
      - internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=internal
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
      - --entrypoints.web.transport.respondingTimeouts.writeTimeout=0
      - --entrypoints.web.transport.respondingTimeouts.idleTimeout=3600s
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    name: internal
    driver: bridge

volumes:
  traefik-letsencrypt:
