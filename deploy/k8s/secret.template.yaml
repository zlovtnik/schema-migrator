apiVersion: v1
kind: Secret
metadata:
  name: schema-migrator-secrets
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: schema-migrator
type: Opaque
stringData:
  BEDROCK_ENCRYPT_KEY: REPLACE_WITH_BASE64_32_BYTE_KEY
  BEDROCK_JWT_SECRET: REPLACE_WITH_JWT_SECRET
  BEDROCK_API_BEARER_TOKEN: REPLACE_WITH_STATIC_API_TOKEN
  BEDROCK_STATE_DB_URL: jdbc:mysql://REPLACE_WITH_TIDB_HOST:4000/schema_migrator?sslMode=VERIFY_IDENTITY
  BEDROCK_STATE_DB_USER: REPLACE_WITH_SCHEMA_MIGRATOR_TIDB_USER
  BEDROCK_STATE_DB_PASSWORD: REPLACE_WITH_SCHEMA_MIGRATOR_TIDB_PASSWORD
  BEDROCK_STATE_DB_TRUSTSTORE_PASSWORD: REPLACE_WITH_PKCS12_PASSWORD
  BEDROCK_KEYCLOAK_ISSUER: https://REPLACE_WITH_EXTERNAL_IDP/realms/middleware
  BEDROCK_KEYCLOAK_JWKS_URI: https://REPLACE_WITH_EXTERNAL_IDP/realms/middleware/protocol/openid-connect/certs
binaryData:
  truststore.p12: REPLACE_WITH_BASE64_PKCS12_TRUSTSTORE
