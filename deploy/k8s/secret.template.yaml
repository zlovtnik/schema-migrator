apiVersion: v1
kind: Secret
metadata:
  name: schema-migrator-secrets
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: schema-migrator
type: Opaque
stringData:
  BEDROCK_ENCRYPT_KEY: REPLACE_WITH_BASE64_32_BYTE_KEY
  BEDROCK_JWT_SECRET: REPLACE_WITH_JWT_SECRET
  BEDROCK_API_BEARER_TOKEN: REPLACE_WITH_STATIC_API_TOKEN
  BEDROCK_STATE_DB_PASSWORD: REPLACE_WITH_STATE_POSTGRES_PASSWORD
  BEDROCK_DB_URL: REPLACE_WITH_POSTGRES_JDBC_URL
  BEDROCK_DB_USER: REPLACE_WITH_POSTGRES_USER
  BEDROCK_DB_PASSWORD: REPLACE_WITH_POSTGRES_PASSWORD
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: REPLACE_WITH_KEYCLOAK_ADMIN_PASSWORD
