apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-migrator-config
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: schema-migrator
data:
  BEDROCK_HTTP_HOST: "0.0.0.0"
  BEDROCK_HTTP_PORT: "8080"
  BEDROCK_CORS_ORIGINS: "https://REPLACE_WITH_PUBLIC_HOSTNAME"
  BEDROCK_DEV_AUTH_ENABLED: "false"
  BEDROCK_DEV_AUTH_SECRET: ""
  BEDROCK_KEYCLOAK_ENABLED: "true"
  BEDROCK_KEYCLOAK_CLIENT_ID: "bedrock-ui"
  BEDROCK_KEYCLOAK_AUDIENCE: "bedrock-ui"
  BEDROCK_STATE_DB_POOL_SIZE: "10"
  BEDROCK_DB_TEST_ALLOWED_HOSTS: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: frontend
data:
  runtime-config.js: |
    window.__BEDROCK_CONFIG__ = {
      keycloakUrl: "https://REPLACE_WITH_EXTERNAL_IDP",
      keycloakRealm: "middleware",
      keycloakClientId: "bedrock-ui",
      keycloakRedirectUri: "https://REPLACE_WITH_PUBLIC_HOSTNAME/callback"
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: traefik
data:
  traefik.yaml: |
    entryPoints:
      web:
        address: ":8080"
        transport:
          respondingTimeouts:
            readTimeout: 300s
            writeTimeout: 0s
            idleTimeout: 3600s
    providers:
      file:
        filename: /etc/traefik/dynamic/dynamic.yaml
        watch: true
    api:
      dashboard: false
  dynamic.yaml: |
    http:
      routers:
        backend:
          entryPoints: ["web"]
          rule: "PathPrefix(`/api`)"
          priority: 10
          service: backend
        frontend:
          entryPoints: ["web"]
          rule: "PathPrefix(`/`)"
          priority: 1
          service: frontend
      services:
        backend:
          loadBalancer:
            servers:
              - url: "http://backend:8080"
        frontend:
          loadBalancer:
            servers:
              - url: "http://frontend:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: REPLACE_WITH_PINNED_BACKEND_IMAGE
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: schema-migrator-config
            - secretRef:
                name: schema-migrator-secrets
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djavax.net.ssl.trustStore=/run/tidb-tls/truststore.p12
                -Djavax.net.ssl.trustStorePassword=$(BEDROCK_STATE_DB_TRUSTSTORE_PASSWORD)
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: backend-tmp
              mountPath: /tmp
            - name: tidb-truststore
              mountPath: /run/tidb-tls
              readOnly: true
      volumes:
        - name: backend-tmp
          emptyDir: {}
        - name: tidb-truststore
          secret:
            secretName: schema-migrator-secrets
            items:
              - key: truststore.p12
                path: truststore.p12
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: REPLACE_WITH_PINNED_FRONTEND_IMAGE
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
              readOnly: true
            - name: frontend-tmp
              mountPath: /tmp
            - name: frontend-cache
              mountPath: /var/cache/nginx
            - name: frontend-run
              mountPath: /var/run
      volumes:
        - name: frontend-config
          configMap:
            name: frontend-config
        - name: frontend-tmp
          emptyDir: {}
        - name: frontend-cache
          emptyDir: {}
        - name: frontend-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      containers:
        - name: traefik
          image: traefik:v3.6
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args: ["--configFile=/etc/traefik/traefik.yaml"]
          ports:
            - name: web
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: traefik-config
              mountPath: /etc/traefik/traefik.yaml
              subPath: traefik.yaml
              readOnly: true
            - name: traefik-config
              mountPath: /etc/traefik/dynamic/dynamic.yaml
              subPath: dynamic.yaml
              readOnly: true
            - name: traefik-tmp
              mountPath: /tmp
      volumes:
        - name: traefik-config
          configMap:
            name: traefik-config
        - name: traefik-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: schema-migrator-edge
  namespace: schema-migrator
  labels:
    app.kubernetes.io/name: schema-migrator
  annotations:
    oci.oraclecloud.com/load-balancer-type: "lb"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: web
      port: 80
      targetPort: web
