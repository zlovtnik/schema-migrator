name: schema-migrator

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  test-and-postgres-fixture:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: schema_migrator
          POSTGRES_USER: migrator
          POSTGRES_PASSWORD: migrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U migrator -d schema_migrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://migrator:migrator@localhost:5432/schema_migrator?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Scala format check
        run: sbt scalafmtCheck

      - name: Scalafix check
        run: sbt "scalafixAll --check"

      - name: Unit tests
        run: sbt test

      - name: Validate Postgres fixture manifest
        run: sbt "run --db-kind postgres --sql-dir ./sql/postgres --customer fixture validate"

      - name: Apply full Postgres fixture manifest
        run: sbt "run --db-kind postgres --sql-dir ./sql/postgres --customer fixture apply"

      - name: Snapshot Postgres function definitions
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "
            select pg_get_functiondef(p.oid)
              from pg_proc p
              join pg_namespace n on n.oid = p.pronamespace
             where n.nspname not in ('pg_catalog', 'information_schema')
               and n.nspname not like 'pg_toast%'
             order by n.nspname, p.proname, p.oid::regprocedure::text
          " | sha256sum | cut -d ' ' -f 1 > /tmp/schema-migrator-functions.sha256

      - name: Re-apply fixture manifest for idempotency
        run: |
          sbt "run --db-kind postgres --sql-dir ./sql/postgres --customer fixture apply"
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "
            select pg_get_functiondef(p.oid)
              from pg_proc p
              join pg_namespace n on n.oid = p.pronamespace
             where n.nspname not in ('pg_catalog', 'information_schema')
               and n.nspname not like 'pg_toast%'
             order by n.nspname, p.proname, p.oid::regprocedure::text
          " | sha256sum | cut -d ' ' -f 1)" = "$(cat /tmp/schema-migrator-functions.sha256)"

      - name: Apply fixture manifest a third time
        run: |
          sbt "run --db-kind postgres --sql-dir ./sql/postgres --customer fixture apply"
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "
            select pg_get_functiondef(p.oid)
              from pg_proc p
              join pg_namespace n on n.oid = p.pronamespace
             where n.nspname not in ('pg_catalog', 'information_schema')
               and n.nspname not like 'pg_toast%'
             order by n.nspname, p.proname, p.oid::regprocedure::text
          " | sha256sum | cut -d ' ' -f 1)" = "$(cat /tmp/schema-migrator-functions.sha256)"

      - name: Check clean fixture drift
        run: sbt "run --db-kind postgres --sql-dir ./sql/postgres --customer fixture --json drift-check"

      - name: Install registry report view
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f sql/registry/drift_report.sql

      - name: Inject intentional fixture drift
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          create or replace function public.sync_stable_uuid(value text)
          returns uuid
          language sql
          immutable
          as $$
            select gen_random_uuid()
          $$;
          SQL

      - name: Assert injected drift is reported
        run: |
          set +e
          output=$(sbt "run --db-kind postgres --sql-dir ./sql/postgres --customer fixture --json drift-check" 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            echo "expected drift-check to fail after injected drift"
            exit 1
          fi
          echo "$output" | grep '"drift_type":"definition_changed"'
          echo "$output" | grep '"name":"sync_stable_uuid(text)"'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "
            select customization_status
              from schema_control.drift_report
             where customer = 'fixture'
               and object_schema = 'public'
               and object_type = 'function'
               and object_name = 'sync_stable_uuid(text)'
          " | grep '^customized$'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schema-migrator-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
